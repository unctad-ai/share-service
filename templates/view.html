{{template "base.html" .}}

{{define "title"}}{{.Doc.Title}} — share.{{end}}

{{define "body"}}
<nav class="nav">
  <div class="nav-left">
    <a href="/" class="logo"><span class="logo-text">share<span class="logo-dot">.</span></span></a>
    <span class="nav-title">{{.Doc.Title}}</span>
  </div>
  <div class="nav-right">
    <span>{{.Doc.CreatedAt | formatdate}}</span>
    <div class="view-toggle">
      <button class="view-toggle-btn active" id="btnRendered" onclick="showRendered()">Rendered</button>
      <button class="view-toggle-btn" id="btnSource" onclick="showSource()">Source</button>
    </div>
    <a class="nav-toggle" id="claudeLink" href="claude-cli://open?q=" title="Open in Claude Code">Claude ↗</a>
  </div>
</nav>
{{if eq .Doc.Format "md"}}
<article class="md-body" id="rendered"></article>
<div class="source-view" id="source"><div class="source-gutter" id="gutter"></div><div class="source-code" id="sourceCode">{{.Content}}</div></div>
{{else}}
<iframe class="viewer-frame" id="rendered" sandbox="allow-scripts" srcdoc="{{.Content}}"></iframe>
<div class="source-view" id="source"><div class="source-gutter" id="gutter"></div><div class="source-code" id="sourceCode">{{.Content}}</div></div>
{{end}}
{{end}}

{{define "scripts"}}
{{if eq .Doc.Format "md"}}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.7/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
<script>
(function() {
  marked.setOptions({
    gfm: true,
    breaks: false,
    highlight: function(code, lang) {
      if (lang && hljs.getLanguage(lang)) {
        return hljs.highlight(code, {language: lang}).value;
      }
      return hljs.highlightAuto(code).value;
    }
  });
  var src = document.getElementById('sourceCode').textContent;
  document.getElementById('rendered').innerHTML = marked.parse(src);
})();
</script>
{{end}}
<script>
(function() {
  // Generate line numbers
  var code = document.getElementById('sourceCode').textContent;
  var lines = code.split('\n');
  var gutter = document.getElementById('gutter');
  var nums = [];
  for (var i = 1; i <= lines.length; i++) nums.push(i);
  gutter.textContent = nums.join('\n');
})();

function showSource() {
  document.getElementById('rendered').style.display = 'none';
  document.getElementById('source').style.display = 'flex';
  document.getElementById('btnSource').classList.add('active');
  document.getElementById('btnRendered').classList.remove('active');
}
function showRendered() {
  document.getElementById('rendered').style.display = '';
  document.getElementById('source').style.display = 'none';
  document.getElementById('btnRendered').classList.add('active');
  document.getElementById('btnSource').classList.remove('active');
}
document.getElementById('claudeLink').href = 'claude-cli://open?q=' + encodeURIComponent('{{.RawURL}}');
</script>
{{end}}
