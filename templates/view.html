{{template "base.html" .}}

{{define "title"}}{{.Doc.Title}} — share.{{end}}

{{define "body"}}
<nav class="nav">
  <div class="nav-left">
    <a href="/" class="logo"><span class="logo-text">share<span class="logo-dot">.</span></span></a>
    <span class="nav-title">{{.Doc.Title}}</span>
  </div>
  <div class="nav-right">
    <span>{{.Doc.CreatedAt | formatdate}}</span>
    <button class="nav-toggle" onclick="toggleSource()" id="sourceToggle">Source</button>
    <a class="nav-toggle" id="claudeLink" href="claude-cli://open?q=" title="Open in Claude Code">Claude ↗</a>
  </div>
</nav>
<iframe class="viewer-frame" id="rendered" sandbox="allow-scripts" srcdoc="{{.Content}}"></iframe>
<pre class="viewer-source" id="source">{{.Content}}</pre>
{{end}}

{{define "scripts"}}
<script>
function toggleSource() {
  var rendered = document.getElementById('rendered');
  var source = document.getElementById('source');
  var btn = document.getElementById('sourceToggle');
  var showing = source.style.display === 'block';
  rendered.style.display = showing ? '' : 'none';
  source.style.display = showing ? 'none' : 'block';
  btn.textContent = showing ? 'Source' : 'Rendered';
}
document.getElementById('claudeLink').href = 'claude-cli://open?q=' + encodeURIComponent('{{.RawURL}}');
</script>
{{end}}
