{{template "base.html" .}}

{{define "title"}}Published — share.{{end}}

{{define "body"}}
<nav class="nav">
  <div class="nav-left">
    <a href="/" class="logo"><span class="logo-text">share<span class="logo-dot">.</span></span></a>
  </div>
</nav>
<div class="confirm">
  <div class="confirm-card">
    <div class="confirm-heading">Document published</div>
    <p class="confirm-url"><a href="{{.URL}}">{{.URL}}</a></p>

    <div class="secret-label">Management secret</div>
    <div class="secret-box" id="secret">{{.Secret}}</div>
    <div class="secret-actions">
      <button class="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('secret').textContent).then(()=>this.textContent='Copied')">Copy secret</button>
    </div>

    <div class="secret-warning">
      <span>This secret is shown only once. You need it to update or delete this document without a publisher token.</span>
    </div>

    <div class="confirm-actions">
      <a href="{{.URL}}" class="btn">View document</a>
      <a href="/" class="btn btn-ghost">Back to feed</a>
    </div>
  </div>
</div>
{{end}}
